version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aura_postgres_db
    restart: always
    environment:
      POSTGRES_DB: aura_db
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: Oggy@1236
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d aura_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: aura_fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_DATABASE_URL=postgresql+asyncpg://postgres_user:Oggy%401236@db:5432/aura_db
      - APP_SECRET_KEY=aura-dev-secret-key-change-in-production-2026
      - APP_GEMINI_API_KEY=YOUR_GEMINI_API_KEY_HERE
      - APP_CORS_ORIGINS=["http://localhost:3000"]
      - APP_ENVIRONMENT=development
      - APP_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - APP_REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      db:
        condition: service_healthy
    # Wait for DB, run migrations/seeding, and start FastAPI
    command: sh -c "python seed_data.py && uvicorn src.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    container_name: aura_nextjs_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
